<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sudoku</title>
    <style>
        :root {
            --bg: #121214;
            --cell: #1e1e24;
            --text: #ffffff;
            --highlight: #3d5afe;
            --border: #444;
            --fixed: #777;
            --win: #4caf50;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }

        .header { text-align: center; margin-bottom: 10px; }
        .stats { display: flex; gap: 20px; font-family: monospace; font-size: 1.1rem; margin-bottom: 10px; color: #aaa; }

        .menu { margin-bottom: 20px; display: flex; gap: 10px; }
        select, button.menu-btn {
            padding: 12px 15px;
            background: #2a2a30;
            color: white;
            border: 1px solid #555;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* 9x9 Grid Layout */
        #grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            border: 3px solid var(--text);
            width: 92vw;
            max-width: 450px;
            aspect-ratio: 1 / 1;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .cell {
            background: var(--cell);
            border: 0.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
        }

        /* 3x3 Subgrid Dividers */
        .cell:nth-child(3n) { border-right: 3px solid var(--text); }
        .cell:nth-child(9n) { border-right: 0.5px solid var(--border); } /* Fix outer edge */
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 3px solid var(--text); }

        .cell.selected { background: var(--highlight); color: white; }
        .cell.fixed { color: var(--fixed); font-weight: bold; cursor: default; background: #16161c; }
        .cell.correct { color: #00ffcc; }

        .numpad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
            width: 92vw;
            max-width: 450px;
        }

        .btn {
            background: #2a2a30;
            color: white;
            border: 1px solid #444;
            padding: 18px 0;
            font-size: 1.4rem;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #111;
        }

        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #111; background: var(--highlight); }
        .btn.delete { background: #662222; }

        #message { margin-top: 15px; font-weight: bold; height: 24px; text-transform: uppercase; color: #ffcc00; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Sudoku</h1>
        <div class="stats">
            <span id="timer">00:00</span>
            <span id="clues">Clues: 0</span>
        </div>
    </div>

    <div class="menu">
        <select id="difficulty">
            <option value="30">Easy (51 Clues)</option>
            <option value="45">Medium (36 Clues)</option>
            <option value="55">Hard (26 Clues)</option>
            <option value="60">Expert (21 Clues)</option>
        </select>
        <button class="menu-btn" onclick="startNewGame()">Generate</button>
    </div>

    <div id="grid"></div>
    <div id="message"></div>

    <div class="numpad">
        <button class="btn" onclick="inputNumber(1)">1</button>
        <button class="btn" onclick="inputNumber(2)">2</button>
        <button class="btn" onclick="inputNumber(3)">3</button>
        <button class="btn" onclick="inputNumber(4)">4</button>
        <button class="btn" onclick="inputNumber(5)">5</button>
        <button class="btn" onclick="inputNumber(6)">6</button>
        <button class="btn" onclick="inputNumber(7)">7</button>
        <button class="btn" onclick="inputNumber(8)">8</button>
        <button class="btn" onclick="inputNumber(9)">9</button>
        <button class="btn delete" onclick="inputNumber(0)">⌫</button>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const messageElement = document.getElementById('message');
        const timerElement = document.getElementById('timer');
        const clueElement = document.getElementById('clues');
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d, v=0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        let selectedIndex = -1;
        let solution = [];
        let currentGrid = [];
        let initialMask = [];
        let timerInterval;
        let seconds = 0;

        // --- Logic: Procedural Board Generation ---
        function generateSudoku() {
            let board = [
                1,2,3,4,5,6,7,8,9,
                4,5,6,7,8,9,1,2,3,
                7,8,9,1,2,3,4,5,6,
                2,3,1,5,6,4,8,9,7,
                5,6,4,8,9,7,2,3,1,
                8,9,7,2,3,1,5,6,4,
                3,1,2,6,4,5,9,7,8,
                6,4,5,9,7,8,3,1,2,
                9,7,8,3,1,2,6,4,5
            ];

            // Shuffling logic to ensure board is different every time
            const nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
            return board.map(n => nums[n-1]);
        }

        function startNewGame() {
            clearInterval(timerInterval);
            seconds = 0;
            updateTimer();
            timerInterval = setInterval(() => { seconds++; updateTimer(); }, 1000);

            const cellsToRemove = parseInt(document.getElementById('difficulty').value);
            solution = generateSudoku();
            currentGrid = [...solution];
            initialMask = new Array(81).fill(true);
            
            // This is where we "calculate" the difficulty
            let removed = 0;
            while(removed < cellsToRemove) {
                let idx = Math.floor(Math.random() * 81);
                if(initialMask[idx]) {
                    initialMask[idx] = false;
                    currentGrid[idx] = 0;
                    removed++;
                }
            }

            clueElement.innerText = `Clues: ${81 - removed}`;
            renderGrid();
            messageElement.innerText = "";
            playSfx(440, 'sine', 0.1);
        }

        function renderGrid() {
            gridElement.innerHTML = '';
            for (let i = 0; i < 81; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                if (initialMask[i]) {
                    cell.innerText = currentGrid[i];
                    cell.classList.add('fixed');
                } else {
                    cell.innerText = currentGrid[i] !== 0 ? currentGrid[i] : '';
                    cell.onclick = () => selectCell(i);
                }
                if (i === selectedIndex) cell.classList.add('selected');
                gridElement.appendChild(cell);
            }
        }

        function selectCell(index) {
            selectedIndex = index;
            renderGrid();
            playSfx(600, 'triangle', 0.05, 0.05);
        }

        function inputNumber(num) {
            if (selectedIndex === -1 || initialMask[selectedIndex]) return;
            currentGrid[selectedIndex] = num;
            renderGrid();
            
            if (num !== 0) playSfx(800, 'sine', 0.05, 0.05);
            else playSfx(300, 'sine', 0.05, 0.05);

            checkWin();
        }

        function checkWin() {
            // Check if full
            if (currentGrid.every(val => val !== 0)) {
                // Check if correct against solution
                const isCorrect = currentGrid.every((val, i) => val === solution[i]);
                if (isCorrect) {
                    clearInterval(timerInterval);
                    messageElement.innerText = "🏆 PUZZLE COMPLETE!";
                    messageElement.style.color = "#4caf50";
                    playSfx(523, 'square', 0.2);
                    setTimeout(() => playSfx(659, 'square', 0.2), 150);
                    setTimeout(() => playSfx(783, 'square', 0.4), 300);
                } else {
                    messageElement.innerText = "❌ Logic Mismatch Found";
                    messageElement.style.color = "#f44336";
                }
            }
        }

        function updateTimer() {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            timerElement.innerText = `${m}:${s}`;
        }

        // PC Controls
        window.addEventListener('keydown', (e) => {
            if (e.key >= 1 && e.key <= 9) inputNumber(parseInt(e.key));
            if (e.key === 'Backspace' || e.key === '0') inputNumber(0);
        });

        startNewGame();
    </script>
</body>
</html>
